<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

  :root {
    --paper: #F6F1E6;
    --paper-deep: #EFE7D6;
    --ink: #2B2620;
    --ink-soft: #5B5346;
    --rubric: #8A2E24;
    --rubric-soft: #A8493C;
    --gold: #A6822B;
    --line: #DCD1B4;
    --shadow: rgba(43,38,32,0.12);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Source Serif 4', serif;
    min-height: 100vh;
  }

  .app {
    max-width: 780px;
    margin: 0 auto;
    padding: 28px 20px 80px;
  }

  header.top {
    text-align: center;
    margin-bottom: 28px;
    position: relative;
  }

  header.top::after {
    content: "";
    display: block;
    width: 64px;
    height: 2px;
    background: var(--gold);
    margin: 14px auto 0;
  }

  h1.brand {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 1.5rem;
    letter-spacing: 0.02em;
    margin: 0;
    color: var(--rubric);
  }

  .favorites-link {
    position: absolute;
    top: 2px;
    right: 0;
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--gold);
    background: none;
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .favorites-link:hover { border-color: var(--gold); background: var(--paper-deep); }

  .brand small {
    display: block;
    font-family: 'Inter', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 4px;
    font-weight: 500;
  }

  .search-box {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  input#searchInput {
    flex: 1;
    min-width: 0;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    padding: 13px 16px;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: #FFFDF8;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s ease;
    -webkit-appearance: none;
  }
  input#searchInput:focus {
    border-color: var(--gold);
  }

  button.go {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    padding: 0 20px;
    background: var(--rubric);
    color: #FFF9EE;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.15s ease;
    min-height: 46px;
  }
  button.go:hover { background: var(--rubric-soft); }

  .select-row {
    display: flex;
    gap: 8px;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }

  .select-row select {
    flex: 1 1 0;
    min-width: 0;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    padding: 11px 12px;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: #FFFDF8;
    color: var(--ink);
    outline: none;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
    transition: border-color 0.15s ease;
  }
  .select-row select:focus { border-color: var(--gold); }
  .select-row select:disabled { opacity: 0.5; cursor: default; }

  .select-row select#bookSelect { flex: 1 1 45%; }

  .hint {
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    color: var(--ink-soft);
    text-align: center;
    margin: -14px 0 22px;
    opacity: 0.75;
  }

  .card {
    background: #FFFDF8;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 30px 32px;
    box-shadow: 0 2px 12px var(--shadow);
    min-height: 280px;
  }

  .ref-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 18px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 14px;
  }

  .ref {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 1.35rem;
    color: var(--rubric);
    letter-spacing: 0.01em;
  }

  .source-tag {
    font-family: 'Inter', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
  }

  .verse-text {
    font-size: 1.18rem;
    line-height: 1.7;
    color: var(--ink);
    margin-bottom: 22px;
  }

  .verse-text::first-letter {
    font-family: 'Fraunces', serif;
    font-size: 1.9em;
    font-weight: 600;
    color: var(--rubric);
  }

  .comment-label {
    font-family: 'Inter', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .ref-group {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  button.fav-btn {
    font-size: 1.3rem;
    line-height: 1;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--gold);
    padding: 0;
    transition: transform 0.15s ease;
  }
  button.fav-btn:hover { transform: scale(1.15); }
  button.fav-btn.active { color: var(--rubric); }

  .ap-range {
    font-family: 'Inter', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    font-style: normal;
    margin-bottom: 6px;
  }

  .favorite-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .favorite-item > div:first-child { flex: 1; min-width: 0; cursor: pointer; }
  button.unfav-btn {
    font-family: 'Inter', sans-serif;
    background: none;
    border: none;
    color: var(--ink-soft);
    font-size: 0.85rem;
    cursor: pointer;
    padding: 4px 8px;
    flex-shrink: 0;
  }
  button.unfav-btn:hover { color: var(--rubric); }

  .comment-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  button.comment-tab {
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 7px 14px;
    border: 1px solid var(--line);
    border-radius: 20px;
    background: var(--paper-deep);
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  button.comment-tab:hover { border-color: var(--gold); }
  button.comment-tab.active {
    background: var(--rubric);
    border-color: var(--rubric);
    color: #FFF9EE;
  }

  .comment-text {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 1rem;
    line-height: 1.65;
    color: var(--rubric-soft);
  }

  .comment-text:empty::before {
    content: "— sem comentário para este versículo nesta fonte —";
    font-style: normal;
    color: var(--ink-soft);
    opacity: 0.6;
    font-size: 0.85rem;
  }

  .ap-note {
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px dashed var(--line);
  }
  .ap-note:last-child {
    margin-bottom: 0;
    padding-bottom: 0;
    border-bottom: none;
  }

  .empty-state, .loading-state {
    font-family: 'Inter', sans-serif;
    color: var(--ink-soft);
    text-align: center;
    padding: 60px 20px;
    font-size: 0.9rem;
  }

  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    gap: 10px;
  }

    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 0.85rem;
    padding: 11px 18px;
    background: var(--paper-deep);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 3px;
    cursor: pointer;
    flex: 1;
    transition: all 0.15s ease;
  }
  button.nav-btn:hover:not(:disabled) {
    background: var(--gold);
    color: #FFF9EE;
    border-color: var(--gold);
  }
  button.nav-btn:disabled {
    opacity: 0.35;
    cursor: default;
  }

  .results-list {
    margin-top: 8px;
  }
  .result-item {
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 3px;
    margin-bottom: 8px;
    background: #FFFDF8;
    cursor: pointer;
    transition: border-color 0.15s ease;
  }
  .result-item:hover { border-color: var(--gold); }
  .result-item .r-ref {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.78rem;
    color: var(--rubric);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .result-item .r-text {
    font-size: 0.92rem;
    color: var(--ink);
    line-height: 1.5;
  }

  @media (max-width: 640px) {
    .app { padding: 20px 14px 60px; }
  }

  @media (max-width: 480px) {
    .card { padding: 22px 18px; }
    .verse-text { font-size: 1.08rem; }
    .ref { font-size: 1.15rem; }
    .search-box { flex-wrap: wrap; }
    input#searchInput { flex: 1 1 100%; }
    button.go { flex: 1 1 100%; padding: 13px 20px; }
    .select-row select#bookSelect { flex: 1 1 100%; }
    .select-row select { flex: 1 1 100%; }
    .nav-row { flex-direction: column; }
    button.nav-btn { width: 100%; }
    .ref-row { flex-direction: column; align-items: flex-start; gap: 6px; }
    .favorites-link { position: static; display: block; margin: 14px auto 0; width: fit-content; }
  }
</style>
</head>

const BOOK_TO_LABEL = Object.fromEntries(BOOKS.map(b => [b.value, b.label]));

let current = null; // {book, book_order, chapter, verse}
let suppressSelectEvents = false;

async function sb(path) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: { apikey: ANON_KEY, Authorization: `Bearer ${ANON_KEY}` }
  });
  if (!res.ok) throw new Error("Erro na consulta");
  return res.json();
}

async function rpc(name, params) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${name}`, {
    method: 'POST',
    headers: {
      apikey: ANON_KEY,
      Authorization: `Bearer ${ANON_KEY}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(params)
  });
  if (!res.ok) throw new Error("Erro na consulta");
  return res.json();
}

function normalize(s) {
  return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function parseReference(query) {
  const q = query.trim();
  const m = q.match(/^(\d?\s?[a-zA-ZÀ-ú çãõéíóáâêôü]+)\s+(\d+)(?::(\d+))?$/i);
  if (!m) return null;
  let bookRaw = normalize(m[1].trim().replace(/\s+/g, ' '));
  let bookKey = bookRaw.replace(/\s/g, '');
  let book = BOOK_ALIASES[bookRaw] || BOOK_ALIASES[bookKey];
  if (!book) return null;
  return { book, chapter: parseInt(m[2]), verse: m[3] ? parseInt(m[3]) : 1 };
}

async function loadVerse(book, chapter, verse, syncSelects = true, historyMode = 'push') {
  const area = document.getElementById('mainArea');
  area.innerHTML = `<div class="card"><div class="loading-state">Carregando...</div></div>`;
  try {
    let rows = await sb(`verses?book=eq.${encodeURIComponent(book)}&chapter=eq.${chapter}&verse=eq.${verse}&select=*`);
    if (rows.length === 0) {
      // fallback to nearest verse in chapter
      rows = await sb(`verses?book=eq.${encodeURIComponent(book)}&chapter=eq.${chapter}&order=verse.asc&limit=1&select=*`);
    }
    if (rows.length === 0) {
      renderEmpty("Referência não encontrada.");
      return;
    }
    current = rows[0];
    await renderVerse(current);
    if (historyMode !== 'none') updateUrl(current, historyMode === 'replace');
    if (syncSelects) await syncSelectorsToCurrent();
  } catch (e) {
    renderEmpty("Erro ao buscar. Confira sua conexão.");
  }
}

/* ---------- Favoritos (localStorage) ---------- */
const FAVORITES_KEY = 'bibliaExpositorFavoritos';

function getFavorites() {
  try {
    return JSON.parse(localStorage.getItem(FAVORITES_KEY)) || [];
  } catch (e) {
    return [];
  }
}

function saveFavorites(list) {
  localStorage.setItem(FAVORITES_KEY, JSON.stringify(list));
}

function isFavorite(v) {
  return getFavorites().some(f => f.book === v.book && f.chapter === v.chapter && f.verse === v.verse);
}

function handleToggleFavorite() {
  if (!current) return;
  const list = getFavorites();
  const idx = list.findIndex(f => f.book === current.book && f.chapter === current.chapter && f.verse === current.verse);
  if (idx >= 0) {
    list.splice(idx, 1);
  } else {
    list.unshift({ book: current.book, book_order: current.book_order, chapter: current.chapter, verse: current.verse });
  }
  saveFavorites(list);
  renderVerse(current);
}
window.handleToggleFavorite = handleToggleFavorite;

async function showFavorites() {
  const list = getFavorites();
  const area = document.getElementById('mainArea');
  if (list.length === 0) {
    area.innerHTML = `<div class="card"><div class="empty-state">Nenhum favorito ainda. Toque na estrela ☆ ao lado de um versículo pra salvar.</div></div>`;
    return;
  }
  const sorted = [...list].sort((a, b) => (a.book_order ?? 0) - (b.book_order ?? 0) || a.chapter - b.chapter || a.verse - b.verse);
  const rows = await Promise.all(sorted.map(f => sb(`verses?book=eq.${encodeURIComponent(f.book)}&chapter=eq.${f.chapter}&verse=eq.${f.verse}&select=*`)));
  const items = sorted.map((f, i) => {
    const v = rows[i][0];
    const label = BOOK_TO_LABEL[f.book] || f.book;
    const preview = v ? escapeHtml(v.text.slice(0, 120)) + (v.text.length > 120 ? '…' : '') : '<em>versículo não encontrado</em>';
    return `
      <div class="result-item favorite-item">
        <div onclick='selectResult(${JSON.stringify({ book: f.book, book_order: f.book_order, chapter: f.chapter, verse: f.verse, text: v ? v.text : '', comment: v ? v.comment : '' }).replace(/'/g, "&apos;")})'>
          <div class="r-ref">${escapeHtml(label)} ${f.chapter}:${f.verse}</div>
          <div class="r-text">${preview}</div>
        </div>
        <button class="unfav-btn" onclick='removeFavorite(${JSON.stringify(f).replace(/'/g, "&apos;")})' aria-label="Remover dos favoritos">✕</button>
      </div>
    `;
  }).join('');
  area.innerHTML = `<div class="results-list">${items}</div>`;
}
window.showFavorites = showFavorites;

function removeFavorite(f) {
  const list = getFavorites().filter(x => !(x.book === f.book && x.chapter === f.chapter && x.verse === f.verse));
  saveFavorites(list);
  showFavorites();
}
window.removeFavorite = removeFavorite;

/* ---------- URLs amigáveis ---------- */
function pathFor(v) {
  const slug = BOOK_TO_SLUG[v.book] || v.book.toLowerCase();
  return `/${slug}/${v.chapter}/${v.verse}`;
}

function updateUrl(v, replace = false) {
  const path = pathFor(v);
  if (location.pathname === path) return;
  const state = { book: v.book, chapter: v.chapter, verse: v.verse };
  if (replace) history.replaceState(state, '', path);
  else history.pushState(state, '', path);
}

function parsePathReference() {
  const parts = location.pathname.split('/').filter(Boolean);
  if (parts.length < 2) return null;
  const book = SLUG_TO_BOOK[parts[0].toLowerCase()];
  if (!book) return null;
  const chapter = parseInt(parts[1], 10);
  if (!chapter || isNaN(chapter)) return null;
  const verse = parts[2] ? parseInt(parts[2], 10) : 1;
  return { book, chapter, verse: isNaN(verse) ? 1 : verse };
}

window.addEventListener('popstate', () => {
  const ref = parsePathReference();
  if (ref) loadVerse(ref.book, ref.chapter, ref.verse, true, 'none');
});

async function fetchApNotes(book, chapter, verse) {
  try {
    return await rpc('get_ap_notes', { p_book: book, p_chapter: chapter, p_verse: verse });
  } catch (e) {
    return [];
  }
}

function apRangeLabel(book, note) {
  const single = note.chapter_start === note.chapter_end && note.verse_start === note.verse_end;
  if (single) return '';
  const label = BOOK_TO_LABEL[book] || book;
  if (note.chapter_start === note.chapter_end) {
    return `Aplica-se a ${label} ${note.chapter_start}:${note.verse_start}–${note.verse_end}`;
  }
  return `Aplica-se a ${label} ${note.chapter_start}:${note.verse_start}–${note.chapter_end}:${note.verse_end}`;
}

function switchCommentTab(tab) {
  document.querySelectorAll('.comment-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  const tabExpositor = document.getElementById('tabExpositor');
  const tabAp = document.getElementById('tabAp');
  if (tabExpositor) tabExpositor.style.display = tab === 'expositor' ? '' : 'none';
  if (tabAp) tabAp.style.display = tab === 'ap' ? '' : 'none';
}
window.switchCommentTab = switchCommentTab;

function fillSelect(select, items, selectedValue) {
  select.innerHTML = items.map(it =>
    `<option value="${it.value}"${String(it.value) === String(selectedValue) ? ' selected' : ''}>${it.label}</option>`
  ).join('');
  select.disabled = false;
}

async function maxOf(field, filters) {
  const rows = await sb(`verses?${filters}&select=${field}&order=${field}.desc&limit=1`);
  return rows.length ? rows[0][field] : 1;
}

function populateBookSelect() {
  const sel = document.getElementById('bookSelect');
  fillSelect(sel, BOOKS.map(b => ({ value: b.value, label: b.label })), current ? current.book : BOOKS[0].value);
}

async function populateChapterSelect(book, selectedChapter) {
  const sel = document.getElementById('chapterSelect');
  const maxChapter = await maxOf('chapter', `book=eq.${encodeURIComponent(book)}`);
  const items = Array.from({ length: maxChapter }, (_, i) => ({ value: i + 1, label: `Cap. ${i + 1}` }));
  fillSelect(sel, items, selectedChapter);
}

async function populateVerseSelect(book, chapter, selectedVerse) {
  const sel = document.getElementById('verseSelect');
  const maxVerse = await maxOf('verse', `book=eq.${encodeURIComponent(book)}&chapter=eq.${chapter}`);
  const items = Array.from({ length: maxVerse }, (_, i) => ({ value: i + 1, label: `Vers. ${i + 1}` }));
  fillSelect(sel, items, selectedVerse);
}

async function syncSelectorsToCurrent() {
  if (!current) return;
  suppressSelectEvents = true;
  populateBookSelect();
  await populateChapterSelect(current.book, current.chapter);
  await populateVerseSelect(current.book, current.chapter, current.verse);
  suppressSelectEvents = false;
}

async function onBookSelectChange() {
  if (suppressSelectEvents) return;
  const book = document.getElementById('bookSelect').value;
  await loadVerse(book, 1, 1);
}

async function onChapterSelectChange() {
  if (suppressSelectEvents) return;
  const book = document.getElementById('bookSelect').value;
  const chapter = parseInt(document.getElementById('chapterSelect').value);
  await loadVerse(book, chapter, 1);
}

async function onVerseSelectChange() {
  if (suppressSelectEvents) return;
  const book = document.getElementById('bookSelect').value;
  const chapter = parseInt(document.getElementById('chapterSelect').value);
  const verse = parseInt(document.getElementById('verseSelect').value);
  await loadVerse(book, chapter, verse);
}

async function findAdjacent(direction) {
  if (!current) return;
  const area = document.getElementById('mainArea');
  const order = direction === 'next' ? 'book_order.asc,chapter.asc,verse.asc' : 'book_order.desc,chapter.desc,verse.desc';
  const op = direction === 'next' ? 'gt' : 'lt';
  // Build a composite comparison using book_order, chapter, verse tuple emulation via OR logic
  const bo = current.book_order, ch = current.chapter, vs = current.verse;
  let candidates = [];
  if (direction === 'next') {
    candidates = await sb(`verses?and=(book_order.eq.${bo},chapter.eq.${ch},verse.gt.${vs})&order=verse.asc&limit=1&select=*`);
    if (candidates.length === 0) {
      candidates = await sb(`verses?and=(book_order.eq.${bo},chapter.gt.${ch})&order=chapter.asc,verse.asc&limit=1&select=*`);
    }
    if (candidates.length === 0) {
      candidates = await sb(`verses?book_order=gt.${bo}&order=book_order.asc,chapter.asc,verse.asc&limit=1&select=*`);
    }
  } else {
    candidates = await sb(`verses?and=(book_order.eq.${bo},chapter.eq.${ch},verse.lt.${vs})&order=verse.desc&limit=1&select=*`);
    if (candidates.length === 0) {
      candidates = await sb(`verses?and=(book_order.eq.${bo},chapter.lt.${ch})&order=chapter.desc,verse.desc&limit=1&select=*`);
    }
    if (candidates.length === 0) {
      candidates = await sb(`verses?book_order=lt.${bo}&order=book_order.desc,chapter.desc,verse.desc&limit=1&select=*`);
    }
  }
  if (candidates.length > 0) {
    current = candidates[0];
    await renderVerse(current);
    updateUrl(current);
    await syncSelectorsToCurrent();
  }
}

function escapeHtml(s) {
  return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

async function renderVerse(v) {
  const area = document.getElementById('mainArea');
  const apNotes = await fetchApNotes(v.book, v.chapter, v.verse);
  const apHtml = apNotes.map(n => {
    const label = apRangeLabel(v.book, n);
    const tag = label ? `<div class="ap-range">${escapeHtml(label)}</div>` : '';
    return `<div class="ap-note">${tag}${escapeHtml(n.comment)}</div>`;
  }).join('');
  const refLabel = BOOK_TO_LABEL[v.book] || v.book;
  const fav = isFavorite(v);
  area.innerHTML = `
    <div class="card">
      <div class="ref-row">
        <div class="ref-group">
          <button class="fav-btn${fav ? ' active' : ''}" onclick="handleToggleFavorite()" aria-label="Favoritar" aria-pressed="${fav}">${fav ? '★' : '☆'}</button>
          <div class="ref">${escapeHtml(refLabel)} ${v.chapter}:${v.verse}</div>
        </div>
        <div class="source-tag">Expositor</div>
      </div>
      <div class="verse-text">${escapeHtml(v.text)}</div>
      <div class="comment-label">Comentário</div>
      <div class="comment-tabs">
        <button class="comment-tab active" data-tab="expositor" onclick="switchCommentTab('expositor')">Expositor</button>
        <button class="comment-tab" data-tab="ap" onclick="switchCommentTab('ap')">Aplicação Pessoal</button>
      </div>
      <div id="tabExpositor" class="comment-panel">
        <div class="comment-text">${escapeHtml(v.comment)}</div>
      </div>
      <div id="tabAp" class="comment-panel" style="display:none;">
        ${apHtml || '<div class="comment-text"></div>'}
      </div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="findAdjacent('prev')">◂ Anterior</button>
      <button class="nav-btn" onclick="findAdjacent('next')">Próximo ▸</button>
    </div>
  `;
}

function renderEmpty(msg) {
  document.getElementById('mainArea').innerHTML = `<div class="card"><div class="empty-state">${escapeHtml(msg)}</div></div>`;
}

function renderResultsList(rows, query) {
  const area = document.getElementById('mainArea');
  if (rows.length === 0) {
    renderEmpty(`Nenhum resultado para "${query}".`);
    return;
  }
  const items = rows.map(r => `
    <div class="result-item" onclick='selectResult(${JSON.stringify(r).replace(/'/g, "&apos;")})'>
      <div class="r-ref">${escapeHtml(BOOK_TO_LABEL[r.book] || r.book)} ${r.chapter}:${r.verse}</div>
      <div class="r-text">${escapeHtml(r.text.slice(0, 140))}${r.text.length > 140 ? '…' : ''}</div>
    </div>
  `).join("");
  area.innerHTML = `<div class="results-list">${items}</div>`;
}

async function selectResult(row) {
  current = row;
  await renderVerse(current);
  updateUrl(current);
  await syncSelectorsToCurrent();
}
window.selectResult = selectResult;

async function handleSearch() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;

  const ref = parseReference(query);
  if (ref) {
    await loadVerse(ref.book, ref.chapter, ref.verse);
    return;
  }

  // keyword search — full-text (radical de palavra, relevância) via RPC, com fallback pra ilike
  const area = document.getElementById('mainArea');
  area.innerHTML = `<div class="card"><div class="loading-state">Buscando...</div></div>`;
  try {
    const rows = await rpc('search_verses', { query });
    renderResultsList(rows, query);
  } catch (e) {
    try {
      const encoded = encodeURIComponent(`%${query}%`);
      const rows = await sb(`verses?text=ilike.${encoded}&order=book_order.asc,chapter.asc,verse.asc&limit=30&select=*`);
      renderResultsList(rows, query);
    } catch (e2) {
      renderEmpty("Erro na busca por palavra-chave.");
    }
  }
}

document.getElementById('searchInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleSearch();
});

document.getElementById('bookSelect').addEventListener('change', onBookSelectChange);
document.getElementById('chapterSelect').addEventListener('change', onChapterSelectChange);
document.getElementById('verseSelect').addEventListener('change', onVerseSelectChange);
document.getElementById('favoritesBtn').addEventListener('click', showFavorites);

// carga inicial: usa a URL se apontar pra uma referência válida, senão Gênesis 1:1
populateBookSelect();
const initialRef = parsePathReference();
if (initialRef) {
  loadVerse(initialRef.book, initialRef.chapter, initialRef.verse, true, 'replace');
} else {
  loadVerse("GENESIS", 1, 1, true, 'replace');
}
</script>
